# Include this inside a shared API domain server { ... } block.
# It proxies /market-kit-api and /market-kit-api/* to the local market-kit backend.

location = /market-kit-api {
    proxy_pass http://127.0.0.1:18120/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}

location /market-kit-api/ {
    rewrite ^/market-kit-api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:18120;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
